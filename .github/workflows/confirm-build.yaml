name: Confirm Build

on:
    # Run automatically when a defrag PR is opened
    pull_request:
        types: [opened]
        branches: [main]

    # Or trigger manually on any branch
    workflow_dispatch:

jobs:
    confirm-build:
        runs-on: ubuntu-latest

        # Only auto-run on defrag PRs; always run on manual dispatch
        if: >
            github.event_name == 'workflow_dispatch' ||
            startsWith(github.head_ref, 'defrag-docs-')

        permissions:
            contents: write

        steps:
            - name: Checkout PR branch
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.head_ref || github.ref }}

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Install dependencies
              run: pnpm install

            - name: Check if build passes
              id: build-check
              run: |
                  if pnpm run build 2>&1; then
                    echo "status=pass" >> "$GITHUB_OUTPUT"
                  else
                    echo "status=fail" >> "$GITHUB_OUTPUT"
                  fi

            - name: Fix build errors
              if: steps.build-check.outputs.status == 'fail'
              env:
                  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
              run: node scripts/confirm-build.mjs

            - name: Commit fixes
              if: steps.build-check.outputs.status == 'fail'
              run: |
                  if [ -z "$(git status --porcelain docs/)" ]; then
                    echo "No fixes needed"
                    exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  git add docs/
                  git commit -m "fix: auto-fix docs build errors"
                  git push
